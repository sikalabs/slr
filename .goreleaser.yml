version: 2

project_name: slr

before:
  hooks:
    - rm -rf ./dist
    - go mod tidy
    - git push
    - git push --tags
builds:
  -
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X github.com/sikalabs/slr/version.Version=v{{.Version}}
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: slr

archives:
  - formats: [ "tar.gz" ]
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  prerelease: auto
  extra_files:
    - glob: ./dist/slr_windows_amd64_v1/slr.exe

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

brews:
  -
    name: slr
    repository:
      owner: sikalabs
      name: homebrew-tap
    skip_upload: auto
    homepage: https://github.com/sikalabs/slr
    url_template: "https://github.com/sikalabs/slr/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    directory: Formula
    caveats: "How to use this binary: https://github.com/sikalabs/slr"
    description: "slr"
    install: |
      bin.install "slr"
    test: |
      system "#{bin}/slr version"

dockers_v2:
  - dockerfile: Dockerfile.goreleaser
    ids:
      - slr
    images:
      - "ghcr.io/sikalabs/slr"
    tags:
      - "{{ .Tag }}"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "https://github.com/sikalabs/slr"
      "org.label-schema.schema-version": "1.0"
      "org.label-schema.version": "{{.Version}}"
      "org.label-schema.name": "{{.ProjectName}}"
      "com.github.actions.name": "{{.ProjectName}}"
      "repository": "https://github.com/sikalabs/slr"
      "maintainer": "SikaLabs <opensource@sikalabs.com>"

scoops:
  -
    repository:
      owner: sikalabs
      name: scoop-bucket
    homepage:  https://github.com/sikalabs/slr
    description: SikaLabs Random Utils
    license: MIT
