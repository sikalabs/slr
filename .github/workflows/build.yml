name: "Try to build it"

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
      - name: Install komac
        run: |
          VERSION=$(curl -s https://api.github.com/repos/russellbanks/Komac/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'][1:])")
          curl -sLO https://github.com/russellbanks/Komac/releases/latest/download/komac_${VERSION}_amd64.deb
          sudo dpkg -i komac_${VERSION}_amd64.deb
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: build --snapshot --skip before
