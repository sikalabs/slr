name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - name: Install komac
        run: |
          curl -sL $(curl -s https://api.github.com/repos/russellbanks/Komac/releases/latest | python3 -c "import sys,json; print(next(a['browser_download_url'] for a in json.load(sys.stdin)['assets'] if a['name'].endswith('_amd64.deb')))") -o komac.deb && sudo dpkg -i komac.deb && rm komac.deb
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --skip before
          version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_GORELEASER }}
